# ============================================
# 默认配置 - 自动检测设备
# ============================================

# 是否自动检测设备 (cuda/mps/cpu)
auto_detect_device: true

# 音频采集配置
capture:
  sample_rate: 16000
  channels: 1
  chunk_size: 1024
  device_index: null   # null=系统默认麦克风，可用 AudioCapture.list_devices() 查看
  target_sample_rate: 16000

# ASR 配置
asr:
  model_size: "base"       # tiny/base/small/medium/large-v2
  device: "auto"           # auto/cuda/cpu
  compute_type: "int8"     # int8/float16/float32
  language: "zh"           # 识别语言
  vad_filter: true         # 启用 VAD 自动分句
  vad_parameters:
    min_silence_duration_ms: 600
    speech_pad_ms: 200
    threshold: 0.5
  beam_size: 3
  chunk_duration_sec: 3.0  # 每次处理的音频时长

# 翻译配置
translator:
  model_name: "facebook/nllb-200-distilled-600M"
  device: "auto"
  src_lang: "zh"
  tgt_lang: "ja"
  max_length: 256
  beam_size: 4
  temperature: 0.1
  batch_size: 1

# TTS 配置 (GPT-SoVITS API)
tts:
  api_url: "http://127.0.0.1:9880"
  refer_wav_path: "reference_audio/my_voice.wav"  # 参考音频（5-15秒自己的语音）
  prompt_text: ""          # 参考音频对应的中文文本
  prompt_language: "zh"    # 参考音频语言
  output_language: "ja"    # 输出语言
  speed: 1.0
  top_k: 15
  top_p: 1.0
  temperature: 1.0
  timeout: 30
  retry_count: 2

# 音频输出配置
player:
  sample_rate: 16000
  channels: 1
  device_index: null       # null=默认输出设备，设为虚拟音频设备索引以接入 OBS
  buffer_size: 10.0
  volume: 1.0

# 管道配置
pipeline:
  max_queue_size: 32

# 日志配置
logging:
  level: "INFO"
  log_file: null
