# RTX 4050 Laptop (6GB VRAM) - 粤语→普通话模式
auto_detect_device: false
mode: "yue2zh"
capture:
  sample_rate: 16000
  channels: 1
  chunk_size: 1024
  device_index: null
  target_sample_rate: 16000
asr:
  model_size: "base"        # 6GB 显存用 base 模型，够用且省显存
  device: "cuda"
  compute_type: "int8"
  language: "yue"           # 粤语识别
  vad_filter: true
  vad_parameters:
    min_silence_duration_ms: 500   # 粤语语速快，更积极断句
    speech_pad_ms: 150
    threshold: 0.5
  beam_size: 3
  chunk_duration_sec: 2.0   # 更短分片，降低首字延迟
translator:
  model_name: "tencent/HY-MT1.5-1.8B"
  device: "cuda"
  src_lang: "yue"
  tgt_lang: "zh"
  max_new_tokens: 512
  temperature: 0.5          # 粤语→普通话用较低温度，减少口语转换偏差
  top_k: 20
  top_p: 0.6
  repetition_penalty: 1.05
tts:
  api_url: "http://127.0.0.1:9880"
  refer_wav_path: "reference_audio/my_voice.wav"
  prompt_text: "大家好，欢迎来到我的直播间。"
  prompt_language: "zh"
  output_language: "zh"
  speed: 1.1
  top_k: 15
  top_p: 1.0
  temperature: 0.8
  seed: 42
  repetition_penalty: 1.5
  text_split_method: "cut5"
  min_text_length: 3
  timeout: 30
  retry_count: 2
player:
  sample_rate: 32000
  channels: 1
  device_index: null
  buffer_size: 10.0
  volume: 1.0
pipeline:
  max_queue_size: 16
logging:
  level: "INFO"
  log_file: "logs/pipeline.log"
